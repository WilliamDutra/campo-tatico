<div class="flex flex-col items-center justify-center min-h-[100px] camisa" cdkDrag>
  <div class="relative">
    <div class="rounded-full h-[60px] w-[60px] bg-white flex justify-center items-center">
      <span class="bold text-3xl">{{ jogador().camisa }}</span>
    </div>
    @if (temCartoes) {
      <div class="absolute -right-8 bottom-5 flex gap-1">
        <div class="rounded [25px] w-[15px] bg-yellow-500 text-sm text-center text-white">
          {{ cartoesAmarelos }}
        </div>
        @if (cartoesVermelhos! > 0) {
          <div class="rounded h-[25px] w-[15px] bg-red-500 text-sm text-center text-white">
            {{ cartoesVermelhos }}
          </div>
        }
      </div>
    }
  </div>
  <span class="pl-2 pr-2 bold text-1xl text-center rounded-b-lg bg-white nome"
    >{{ jogador().nome }}
  </span>
</div>
